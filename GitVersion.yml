mode: ContinuousDeployment
tag-prefix: '[vV]?'

# Version increments are driven by tags only.
# Commit messages (Conventional Commits) are kept for changelog/readability
# but do NOT influence the version number.
#
# Patch bumps automatically on every merge to main.
# Minor/major bumps only when a maintainer pushes a vX.Y.0 tag.
#
commit-message-incrementing: Disabled

branches:
  main:
    regex: ^main$|^master$
    mode: ContinuousDelivery
    label: 'pre'
    increment: Patch
    is-release-branch: true
    prevent-increment:
      of-merged-branch: false
    track-merge-target: false
    tracks-release-branches: false

  feature:
    regex: ^\d+[-]
    mode: ContinuousDelivery
    label: 'alpha'
    increment: Inherit
    is-release-branch: false
    prevent-increment:
      of-merged-branch: true
    source-branches: ['main']

  bugfix:
    regex: ^bugfix[/\\]
    mode: ContinuousDelivery
    label: 'bugfix'
    increment: Inherit
    is-release-branch: false
    prevent-increment:
      of-merged-branch: true
    source-branches: ['main']

  pull-request:
    mode: ContinuousDelivery
    label: 'pr'
    increment: Inherit

ignore:
  sha: []