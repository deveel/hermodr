name: Events Release

permissions:
  contents: read
  packages: write

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    uses: ./.github/workflows/build-test.yml
    with:
      collect-coverage: true
    secrets: inherit

  publish:
    name: Publish Packages
    needs: build
    uses: ./.github/workflows/publish-packages.yml
    with:
      push-to-nuget-org: true
    secrets: inherit
